services:
  - type: web
    name: all-vaps
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SUMUP_API_KEY
        sync: false
      - key: SUMUP_MERCHANT_CODE
        sync: false

databases:
  - name: allvaps-db
    plan: free
    databaseName: allvaps
    user: allvaps
